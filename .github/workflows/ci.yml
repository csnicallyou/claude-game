name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (xUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore test project
        run: dotnet restore tests/EpochsOfHumanity.Tests.csproj

      - name: Run xUnit tests
        run: dotnet test tests/EpochsOfHumanity.Tests.csproj --no-restore --verbosity normal

  build:
    name: Build (main game)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore main project
        run: dotnet restore EpochsOfHumanity.csproj

      - name: Build (Release)
        run: dotnet build EpochsOfHumanity.csproj --no-restore --configuration Release
